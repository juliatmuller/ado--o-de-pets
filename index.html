<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário De Adoção</title>
</head>
 <link rel="stylesheet" href="style.css">


<h2>~Formulário de Adoção~</h2>

<body>

<div class="caixa">
    <form id="formAdocao">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" placeholder="Digite seu nome...">
        <br>

        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Digite seu email...">
        <br>

          <label for="telefone">telefone:</label>
        <input type="number" id="telefone" placeholder="Digite seu telefone...">
        <br>

        <label for="cpf">CPF:</label>
        <input type="number" id="cpf" placeholder="Digite seu CPF...">
        <br>
 
      <label for="idade">idade:</label>
        <input type="number" id="idade" placeholder="Digite sua idade...">
        <br> 

         <label for="cidade">Cidade:</label>
        <input type="text" id="cidade" placeholder="Digite sua cidade...">
        <br>


          <label for="horas">Quantas horas o animal ficara sozinho por dia?</label>
          <br>
        <input type="number" id="horas" placeholder="Digite a quantidade de horas...">
        <br>

    <label for="mensagem">Motivo:</label>
    <br>
    <textarea id="mensagem" rows="4" cols="30"  placeholder="Digite o motivo da adoção..."></textarea>
    <br>

           <label for="moradia">Moradia:</label>
        <select name="moradia" id="moradia">
            <option value="">Selecione</option>
            <option value="casa">Casa</option>
            <option value="apartamento">Apartamento</option>
        </select>
        <br>

        <label for="quintal">Possui Quintal?</label>
        <input type="radio" name="quintal" value="sim">Sim
        <input type="radio" name="quintal" value="nao">Não
        <br>

        <label for="pets">Ja teve algum pet antes?</label>
        <input type="radio" name="pet" value="sim">Sim
        <input type="radio" name="pet" value="nao">Não
        <br>

    <label>
  <input type="checkbox"> Aceito os termos </label>
   <br>


        <button type="submit">Enviar</button>
    </form>
   <br>

    <div id="resultado"></div>

    <script src="scripts/script.js"></script>
</div>
</body>

</html>
