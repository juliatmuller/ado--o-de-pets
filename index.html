<html lang="en">
 <link rel="stylesheet" href="style.css">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário De Adoção</title>
</head>
<h2>Formulário de Adoção</h2>

<body>

    <form id="formAdocao">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" placeholder="Digite seu nome...">
        <br>

        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Digite seu email...">
        <br>

          <label for="telefone">telefone:</label>
        <input type="number" id="numero" placeholder="Digite seu telefone...">
        <br>

        <label for="cpf">CPF:</label>
        <input type="number" id="cpf" placeholder="Digite seu CPF...">
        <br>
 
      <label for="idade">idade:</label>
        <input type="number" id="numero" placeholder="Digite sua idade...">
        <br> 

         <label for="cidade">Cidade:</label>
        <input type="text" id="cidade" placeholder="Digite sua cidade...">
        <br>



        <label for="moradia">Moradia:</label>
        <select name="moradia" id="moradia">
            <option value="">Selecione</option>
            <option value="casa">Casa</option>
            <option value="apartamento">Apartamento</option>
        </select>
        <br>

        <label for="quintal">Possui Quintal?</label>
        <input type="radio" name="quintal" value="sim">Sim
        <input type="radio" name="quintal" value="nao">Não
        <br>

        <label for="pets">Ja teve algum pet antes?</label>
        <input type="radio" name="pet" value="sim">Sim
        <input type="radio" name="pet" value="nao">Não
        <br>

 <label for="moradia">Quantas horas o animal ficara sozinho por dia?</label>
        <select name="sozinho" id="sozinho">
            <option value="">Selecione a quantidade de horas</option>
            <option value="Nenhuma">nenhuma</option>
            <option value="1h">1h</option>
            <option value="2h">2h</option>
            <option value="3h">3h</option>
            <option value="4h">4h</option>
            <option value="5h">5h</option>
            <option value="6h">6h</option>
            <option value="7h">7h</option>
            <option value="8h">8h</option>
            <option value="9h">9h</option>
            <option value="10h">10h</option>
            <option value="11h">11h</option>
            <option value="12h">12h</option>
            <option value="13h">13h</option>
            <option value="14h">14h</option>
            <option value="15h">15h</option>
            <option value="16h">16h</option>
            <option value="17h">17h</option>
            <option value="18h">18h</option>
            <option value="19h">19h</option>
            <option value="20h">20h</option>
            <option value="21h">21h</option>
            <option value="22h">22h</option>
            <option value="23h">23h</option>
            <option value="24h">24h</option>
                     
        </select>
        <br>


    <label for="mensagem">Motivo:</label>
    <textarea id="mensagem" rows="2" cols="30"  placeholder="Digite o motivo da adoção..."></textarea>
    <br>

    <label>
  <input type="checkbox"> Aceito os termos </label>
   <br>


        <button type="submit">Enviar</button>
    </form>
   <br>

    <div id="resultado"></div>

    <script src="scripts/script.js"></script>

</body>

</html>
