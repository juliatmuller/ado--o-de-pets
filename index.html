<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário De Adoção</title>
</head>
 <link rel="stylesheet" href="style.css">

 
 <body>
   
    <nav>
        <h2>~Formulário de Adoção~</h2>
        <img id="icon" src="assets/doguinho.png" alt="dog">
        </nav>
   <div class="caixa">
    <form id="formAdocao">  
        <label for="nome">Nome:</label>
        <input type="text" id="nome" placeholder="Digite seu nome... " style="width: 300px;">
        <br>

        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Digite seu email..."  style="width: 300px;">
        <br>

          <label for="telefone">Telefone:</label>
        <input type="number" id="telefone" placeholder="Digite seu telefone..." style="width: 280px;">
        <br>

        <label for="cpf">CPF:</label>
        <input type="text" id="cpf" placeholder="Digite seu CPF..." style="width: 310px;">
        <br>
 
      <label for="idade">Idade:</label>
        <input type="number" id="idade" placeholder="Digite sua idade..." style="width: 300px;">
        <br> 

         <label for="cidade">Cidade:</label>
        <input type="text" id="cidade" placeholder="Digite sua cidade..." style="width: 290px;">
        <br>


          <label for="horas">Quantas horas o animal ficara sozinho por dia?</label>
          <br>
        <input type="number" id="horas" placeholder="Digite a quantidade de horas..." style="width: 350px;">
        <br>

    <label for="mensagem">Motivo:</label>
    <br>
    <textarea id="mensagem" rows="4" cols="46"  placeholder="Digite o motivo da adoção..."></textarea>
    <br>

           <label for="moradia">Moradia:</label>
        <select name="moradia" id="moradia" style="width: 360px;">
            <option value="">Selecione</option>
            <option value="casa">Casa</option>
            <option value="apartamento">Apartamento</option>
        </select>
        <br>

        <label for="quintal">Possui Quintal?</label>
        <input type="radio" name="quintal" value="sim">Sim
        <input type="radio" name="quintal" value="nao">Não
        <br>

        <label for="pets">Ja teve algum pet antes?</label>
        <input type="radio" name="pet" value="sim">Sim
        <input type="radio" name="pet" value="nao">Não
        <br>

    <label>
  <input type="checkbox"> Aceito os termos </label>
   <br>


        <button type="submit">Enviar</button>
    </form>
   <br>

    <div id="resultado"></div>
    <form onsubmit="return validarFormulario()"></form>

    <script src="scripts/script.js"></script>
</div>
<img id="bambole" src="assets/bambole.gif" alt="gif">
</body>

</html>
